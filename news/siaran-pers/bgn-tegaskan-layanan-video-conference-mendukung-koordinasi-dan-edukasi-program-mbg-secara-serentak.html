<../../script> <div class="flex flex-col sm:flex-row gap-1 text-base w-full "> <p class="text-gray-600 w-max flex-shrink-0">Sumber:<../../p> <a href="Dok. Biro Hukum dan Humas" target="_blank" rel="noopener noreferrer"> <span class="underline text-blue-500 shrink line-clamp-1 ">Dok. Biro Hukum dan Humas<../../span> <../../a> <../../div> <../../section>  <section class="prose prose-lg max-w-none leading-relaxed custom-table font-urbanist"> <div class="text-gray-700 "><p style="text-align: justify; ;"><strong>Jakarta <../../strong>— Badan Gizi Nasional (BGN) menyampaikan penjelasan terkait pengadaan layanan video conference senilai Rp5,7 miliar untuk periode April hingga Desember 2026. Kepala BGN, Dadan Hindayana, mengatakan layanan tersebut disiapkan untuk mendukung pelaksanaan program makan bergizi gratis yang membutuhkan koordinasi luas, penyampaian arahan teknis secara seragam, serta edukasi kepada berbagai pemangku kepentingan di tingkat pusat dan daerah.<../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;">Dadan menjelaskan bahwa pelaksanaan program makan bergizi tidak hanya bergantung pada distribusi layanan di lapangan, tetapi juga pada kemampuan BGN memastikan seluruh pelaksana memahami arahan, pedoman, dan standar pelaksanaan yang sama. Karena itu, sarana komunikasi digital dengan kapasitas besar diperlukan untuk menjaga keselarasan informasi di seluruh jenjang pelaksanaan program.<../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;">“Program makan bergizi melibatkan banyak pihak, mulai dari pusat, pemerintah daerah, satuan pelayanan, hingga pelaksana di lapangan. Dalam situasi seperti ini, koordinasi yang cepat, serentak, dan terdokumentasi menjadi bagian penting dari keberhasilan program,” ujar Dadan di Jakarta, Jumat (24../../4).<../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;">Menurut Dadan, layanan video conference tersebut merupakan sistem enterprise terpusat yang dikelola oleh Pusat Data dan Informasi (Pusdatin) BGN, dengan kapasitas sekitar 5.000 pengguna aktif dan kemampuan menampung hingga 50.000 peserta dalam satu sesi pertemuan virtual. Layanan ini akan digunakan oleh seluruh struktur organisasi BGN, mulai dari pimpinan tinggi madya (setara eselon I), pimpinan tinggi pratama (setara eselon II), pejabat administrator (setara eselon III), hingga kepala Satuan Pelayanan Pemenuhan Gizi (SPPG) di daerah.<../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;">Layanan tersebut digunakan untuk berbagai kebutuhan program, antara lain rapat koordinasi nasional dan daerah, sosialisasi kebijakan, penyampaian pedoman teknis, bimbingan teknis bagi pelaksana, forum evaluasi program, serta kegiatan edukasi publik. Dengan dukungan kapasitas besar tersebut, BGN dapat menjangkau hingga puluhan ribu peserta dalam satu waktu, termasuk pelaksana di berbagai wilayah yang membutuhkan arahan langsung dari pusat.<../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;">“Kami ingin memastikan bahwa pesan, arahan, dan pedoman pelaksanaan program dapat diterima secara utuh oleh pelaksana di berbagai daerah. Kebutuhan ini sebagai bagian dari sistem kerja untuk menjaga kualitas pelaksanaan program,” tutup Dadan.<../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;"><../../p><p style="text-align: justify; ;"><strong>Biro Hukum dan Humas<../../strong><br><strong>Badan Gizi Nasional<../../strong><../../p><../../div> <../../section> <!-- <div set:html={`<video controls width="320"><source src="https:../../../../www.w3schools.com../../html../../mov_bbb.mp4" type="video../../mp4">Video tidak bisa diputar<../../video>`}><../../div> -->  <../../sect
